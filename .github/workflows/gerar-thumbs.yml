name: Gerar Thumbnails

on:
  push:
    paths:
      - 'midia/**'

jobs:
  thumbs:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: |
          npm install sharp ffmpeg-static fluent-ffmpeg ffprobe-static

      - name: Gerar thumbnails
        run: node gerar-thumbs.js

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add thumbs

          git diff --cached --quiet || \
          git commit -m "Atualiza thumbnails"

          git push